<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Рутина · Daily Tracker</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Daily%20Tracker%22%2C%22short_name%22%3A%22Routine%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0f%22%2C%22theme_color%22%3A%22%230a0a0f%22%2C%22start_url%22%3A%22.%22%7D">
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121c;--surface:rgba(255,255,255,.035);--surface-hi:rgba(255,255,255,.06);
  --stroke:rgba(255,255,255,.08);--stroke-hi:rgba(255,255,255,.16);
  --txt:#f2f3f7;--txt-dim:#8b8d9c;--txt-faint:#5a5c6b;
  --accent:#7c5cff;--accent2:#22d3ee;--good:#34e0a1;--warn:#ffb84d;
  --water:#38bdf8;--danger:#ff4d6a;--money:#a3e635;
  --r:18px;--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 80% -10%,rgba(124,92,255,.18),transparent 60%),
  radial-gradient(900px 500px at -10% 10%,rgba(34,211,238,.10),transparent 55%),var(--bg);
  color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;padding-bottom:calc(96px + var(--sb));min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}

.topbar{position:sticky;top:0;z-index:40;padding:14px 16px 10px;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  background:linear-gradient(to bottom,rgba(10,10,15,.92),rgba(10,10,15,.55));border-bottom:1px solid var(--stroke)}
.topbar .inner{max-width:560px;margin:0 auto}
.ptrack{height:9px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden}
.pfill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 18px rgba(124,92,255,.5);transition:width .5s cubic-bezier(.22,1,.36,1)}
.prow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.prow b{font-size:13px;font-weight:600}.prow span{font-size:13px;color:var(--txt-dim);font-variant-numeric:tabular-nums}

.hero{padding:22px 2px 6px;position:relative}
.hero .hi{font-size:26px;font-weight:700;line-height:1.15}
.hero .name{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{margin-top:6px;color:var(--txt-dim);font-size:14.5px}
.hero .clk{font-variant-numeric:tabular-nums;color:var(--accent2)}
.gear{position:absolute;top:18px;right:2px;font-size:18px;color:var(--txt-faint);cursor:pointer;
  background:var(--surface);width:38px;height:38px;border-radius:11px;display:grid;place-items:center;border:1px solid var(--stroke);text-decoration:none}

.cards{display:flex;gap:10px;margin:14px 0 4px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.cards::-webkit-scrollbar{display:none}
.ccard{flex:none;scroll-snap-align:start;border-radius:16px;padding:15px 18px;min-width:170px;border:1px solid var(--stroke);overflow:hidden}
.ccard .lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-dim);margin-bottom:5px}
.ccard .big{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.ccard .unit{font-size:13px;color:var(--txt-dim);margin-top:3px}
.c-madrid{background:linear-gradient(135deg,rgba(255,107,40,.12),rgba(255,184,77,.06));border-color:rgba(255,184,77,.2)}
.c-madrid .big{color:var(--warn)}
.c-weekend{background:linear-gradient(135deg,rgba(124,92,255,.1),rgba(34,211,238,.06));border-color:rgba(124,92,255,.2)}
.c-weekend .big{color:var(--accent2)}

.wx{border-radius:16px;border:1px solid var(--stroke);padding:14px 16px;margin:10px 0 6px;background:var(--surface)}
.wx-title{font-size:13px;font-weight:600;color:var(--txt-dim);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.wx-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.wx-cell{text-align:center;padding:10px 6px;border-radius:12px;background:var(--bg2);border:1px solid var(--stroke)}
.wx-cell .wtime{font-size:11px;color:var(--txt-faint);text-transform:uppercase;margin-bottom:5px}
.wx-cell .wtemp{font-size:22px;font-weight:700}.wx-cell .wdesc{font-size:12px;color:var(--txt-dim);margin-top:2px}
.wx-cell .wpres{font-size:11px;color:var(--txt-faint);margin-top:4px;font-variant-numeric:tabular-nums}
.wx-alert{margin-top:10px;padding:10px 14px;border-radius:11px;background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.25);
  font-size:13px;color:var(--danger);display:none;align-items:center;gap:8px}
.wx-alert.show{display:flex}

.sec{background:var(--surface);border:1px solid var(--stroke);border-radius:var(--r);margin:14px 0;overflow:hidden}
.sec.warm{background:linear-gradient(180deg,rgba(255,184,77,.05),var(--surface))}
.sec.alert-sec{border-color:rgba(255,77,106,.35);box-shadow:0 0 20px rgba(255,77,106,.08)}
.sec-h{display:flex;align-items:center;gap:11px;padding:15px 16px;cursor:pointer;user-select:none}
.sec-h .ic{font-size:19px;width:30px;height:30px;display:grid;place-items:center;border-radius:10px;background:var(--surface-hi)}
.sec-h .ti{flex:1}.sec-h .ti b{display:block;font-size:15.5px;font-weight:650}
.sec-h .ti small{color:var(--txt-faint);font-size:12px;letter-spacing:.03em;text-transform:uppercase}
.sec-h .cnt{font-size:12.5px;color:var(--txt-dim);font-variant-numeric:tabular-nums;background:var(--surface-hi);padding:3px 9px;border-radius:99px}
.sec-h .chev{color:var(--txt-faint);transition:transform .3s;font-size:13px}
.sec.closed .chev{transform:rotate(-90deg)}.sec.closed .sec-b{display:none}
.sec-b{padding:2px 12px 12px}

.chk{display:flex;align-items:center;gap:13px;padding:12px 8px;border-radius:13px;cursor:pointer;transition:background .15s}
.chk:active{background:var(--surface-hi)}
.box{width:26px;height:26px;flex:none;border-radius:8px;border:2px solid var(--stroke-hi);display:grid;place-items:center;transition:all .25s cubic-bezier(.22,1,.36,1)}
.box svg{width:15px;height:15px;stroke:#0a0a0f;stroke-width:3.2;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:24;stroke-dashoffset:24;transition:stroke-dashoffset .3s .05s}
.chk.on .box{background:var(--good);border-color:var(--good);box-shadow:0 0 16px rgba(52,224,161,.45);transform:scale(1.06)}
.chk.on .box svg{stroke-dashoffset:0}.chk .lab{font-size:14.5px;line-height:1.3;flex:1}
.chk .tm{font-size:12px;color:var(--accent2);font-variant-numeric:tabular-nums;background:rgba(34,211,238,.1);padding:2px 8px;border-radius:7px;flex:none}
.chk.on .lab{color:var(--txt-dim)}
.streak{font-size:12px;color:var(--warn);font-variant-numeric:tabular-nums;flex:none;display:flex;align-items:center;gap:2px;margin-right:4px;opacity:0;transition:opacity .3s}
.streak.on{opacity:1}
.nbtn{width:28px;height:28px;border:none;background:none;color:var(--txt-faint);font-size:14px;cursor:pointer;border-radius:7px;flex:none;display:grid;place-items:center;transition:color .2s,background .2s}
.nbtn:hover,.nbtn.has{color:var(--accent);background:rgba(124,92,255,.1)}
.note-row{padding:0 8px 8px 47px;display:none}.note-row.open{display:block}
.note-row input{width:100%;background:var(--bg2);border:1px solid var(--stroke);color:var(--txt);border-radius:9px;padding:8px 11px;font-size:13px;font-family:inherit;outline:none}
.note-row input:focus{border-color:var(--accent)}

.sleep-row{display:flex;gap:10px;padding:10px 8px;align-items:flex-end;flex-wrap:wrap}
.sleep-col{flex:1;min-width:100px}
.sleep-col label{display:block;font-size:12px;color:var(--txt-dim);margin-bottom:5px}
.sleep-col input{width:100%;background:var(--bg2);border:1px solid var(--stroke-hi);color:var(--txt);border-radius:11px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none;text-align:center;font-variant-numeric:tabular-nums}
.sleep-col input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,.18)}
.sleep-result{text-align:center;padding:10px 8px}
.sleep-result .big{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.sleep-result .unit{font-size:13px;color:var(--txt-dim)}

.field{display:flex;align-items:center;gap:12px;padding:11px 8px}
.field label{flex:1;font-size:14.5px}
.field input,.field textarea{background:var(--bg2);border:1px solid var(--stroke-hi);color:var(--txt);border-radius:11px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.field input{width:108px;text-align:center;font-variant-numeric:tabular-nums}
.field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,.18)}
.field.full{flex-direction:column;align-items:stretch;gap:7px}
.field.full label{font-size:13px;color:var(--txt-dim)}.field.full textarea,.field.full input{width:100%;text-align:left}
.field.full textarea{min-height:54px;resize:vertical;line-height:1.4}
.taskrow{display:flex;gap:10px;padding:8px;align-items:flex-end}
.taskrow .tcol{flex:1}.taskrow .tcol label{display:block;font-size:12px;color:var(--txt-dim);margin-bottom:5px}
.taskrow .tcol input{width:100%;background:var(--bg2);border:1px solid var(--stroke-hi);color:var(--txt);border-radius:11px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none}
.taskrow .tcol input:focus{border-color:var(--accent)}

/* ── water 10 cups ── */
.water{padding:8px 8px 4px}
.cups{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.cup{width:38px;height:52px;border-radius:6px 6px 10px 10px;border:2px solid var(--stroke-hi);position:relative;overflow:hidden;cursor:pointer;background:var(--bg2);transition:transform .12s,border-color .25s}
.cup:active{transform:scale(.9)}
.cup .fill{position:absolute;left:0;right:0;bottom:0;height:0%;background:linear-gradient(180deg,#5fd0fc,var(--water));transition:height .45s cubic-bezier(.22,1,.36,1)}
.cup .fill::before{content:"";position:absolute;top:-5px;left:0;right:0;height:8px;border-radius:50%;background:rgba(255,255,255,.35)}
.cup.on{border-color:var(--water)}.cup.on .fill{height:100%}
.wmeta{text-align:center;margin-top:12px;font-size:15px;color:var(--txt-dim)}
.wmeta b{color:var(--water);font-size:22px;font-variant-numeric:tabular-nums}

/* ── toggle ── */
.toggle{display:flex;align-items:center;padding:12px 8px;gap:12px}
.toggle .lab{flex:1;font-size:14.5px}
.seg{display:flex;background:var(--bg2);border-radius:11px;padding:3px;border:1px solid var(--stroke)}
.seg button{border:none;background:none;color:var(--txt-dim);padding:8px 18px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.seg button.yes.act{background:var(--good);color:#06281c;box-shadow:0 0 14px rgba(52,224,161,.4)}
.seg button.no.act{background:#3a3a48;color:var(--txt)}

/* ── sliders ── */
.slider{padding:14px 10px}.slider .row{display:flex;justify-content:space-between;margin-bottom:9px}
.slider .row b{font-size:14.5px;font-weight:600}
.slider .row .val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:99px;background:rgba(255,255,255,.08);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--txt);cursor:pointer;border:4px solid var(--accent);box-shadow:0 2px 10px rgba(0,0,0,.5)}

/* ── wallet ── */
.wallet{border-radius:14px;border:1px solid rgba(163,230,53,.2);background:linear-gradient(135deg,rgba(163,230,53,.08),rgba(34,211,238,.04));padding:18px;margin:8px 0}
.wallet-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.wallet-ic{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(163,230,53,.2),rgba(163,230,53,.08));display:grid;place-items:center;font-size:22px}
.wallet-sum{flex:1}
.wallet-sum .wlbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-faint)}
.wallet-sum .wval{font-size:28px;font-weight:800;color:var(--money);font-variant-numeric:tabular-nums;margin-top:2px}
.wallet-sum .wval span{font-size:16px;font-weight:600;color:var(--txt-dim)}
.exp-list{margin-top:10px}
.exp-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.exp-row input{background:var(--bg2);border:1px solid var(--stroke);color:var(--txt);border-radius:9px;padding:9px 10px;font-size:13.5px;font-family:inherit;outline:none}
.exp-row input:focus{border-color:var(--money)}
.exp-row .exp-amt{width:80px;text-align:center;font-variant-numeric:tabular-nums}
.exp-row .exp-desc{flex:1;min-width:0}
.exp-del{width:28px;height:28px;border:none;background:rgba(255,77,106,.1);color:var(--danger);border-radius:7px;font-size:14px;cursor:pointer;flex:none;display:grid;place-items:center}
.exp-add{border:1px dashed var(--stroke-hi);background:none;color:var(--txt-dim);width:100%;padding:10px;border-radius:10px;font-size:13px;font-family:inherit;cursor:pointer;margin-top:4px;transition:border-color .2s,color .2s}
.exp-add:hover{border-color:var(--money);color:var(--money)}

/* ── body check ── */
.body-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px}
.body-col{text-align:center}
.body-col .blbl{font-size:11px;color:var(--txt-faint);text-transform:uppercase;margin-bottom:6px}
.body-col textarea{width:100%;background:var(--bg2);border:1px solid var(--stroke);color:var(--txt);border-radius:10px;padding:8px;font-size:12.5px;font-family:inherit;outline:none;min-height:64px;resize:vertical;line-height:1.35}
.body-col textarea:focus{border-color:var(--danger)}

/* ── timeline ── */
.timeline-box{padding:10px 8px}
.timeline-box textarea{width:100%;background:var(--bg2);border:1px solid var(--stroke);color:var(--txt);border-radius:12px;padding:14px;font-size:14px;font-family:inherit;outline:none;min-height:120px;resize:vertical;line-height:1.6}
.timeline-box textarea:focus{border-color:var(--accent)}
.timeline-hint{font-size:12px;color:var(--txt-faint);padding:4px 8px 0}

/* ── plan tomorrow ── */
.plan-card{border-radius:14px;border:1px solid rgba(124,92,255,.2);background:linear-gradient(135deg,rgba(124,92,255,.08),rgba(34,211,238,.04));padding:18px;margin:8px 0}
.plan-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.plan-head .pic{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(124,92,255,.2),rgba(124,92,255,.08));display:grid;place-items:center;font-size:22px}
.plan-head .pinfo b{font-size:15px;display:block}.plan-head .pinfo small{font-size:12px;color:var(--txt-dim)}
.plan-card textarea{width:100%;background:var(--bg2);border:1px solid var(--stroke);color:var(--txt);border-radius:10px;padding:12px;font-size:14px;font-family:inherit;outline:none;min-height:100px;resize:vertical;line-height:1.5}
.plan-card textarea:focus{border-color:var(--accent)}

/* ── cat ── */
.cat-wrap{text-align:center;padding:12px 0 6px;position:relative;height:110px}
.cat{display:inline-block;position:relative}.cat-body{font-size:60px;line-height:1;transition:transform .4s}
.cat-msg{font-size:13px;color:var(--txt-dim);margin-top:6px}
.cat-zzz{position:absolute;right:-18px;top:-8px;font-size:16px;animation:zzz 2s infinite;opacity:.7}
@keyframes zzz{0%,100%{transform:translateY(0) scale(1);opacity:.7}50%{transform:translateY(-12px) scale(1.2);opacity:1}}
.cat-hearts{position:absolute;top:-10px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.cat-heart{font-size:14px;animation:floatheart 1.5s infinite}
@keyframes floatheart{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-14px);opacity:1}}
.cat-heart:nth-child(2){animation-delay:.3s}.cat-heart:nth-child(3){animation-delay:.6s}
.cat-tail{position:absolute;right:-30px;bottom:12px;font-size:28px;transform-origin:left bottom}
.cat-tail.wag{animation:wag .6s infinite alternate}
@keyframes wag{0%{transform:rotate(-10deg)}100%{transform:rotate(15deg)}}

.submitbar{position:fixed;left:0;right:0;bottom:0;z-index:50;padding:12px 16px calc(12px + var(--sb));background:linear-gradient(to top,rgba(10,10,15,.98) 60%,transparent)}
.submitbar .inner{max-width:560px;margin:0 auto}
.send{width:100%;border:none;border-radius:15px;padding:17px;font-size:16.5px;font-weight:700;font-family:inherit;cursor:pointer;color:#fff;background:linear-gradient(90deg,var(--accent),#9d6bff);box-shadow:0 8px 28px rgba(124,92,255,.45);transition:transform .12s,opacity .2s;display:flex;align-items:center;justify-content:center;gap:9px}
.send:active{transform:scale(.97)}.send.busy{opacity:.6;pointer-events:none}
.send.ok{background:linear-gradient(90deg,var(--good),#2bc98f);box-shadow:0 8px 28px rgba(52,224,161,.4)}
.confetti{position:fixed;pointer-events:none;z-index:60;width:9px;height:14px;border-radius:2px;top:0;left:0}
.modal{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:none;align-items:flex-end}
.modal.open{display:flex}
.sheet{background:var(--bg2);width:100%;max-width:560px;margin:0 auto;border-radius:22px 22px 0 0;padding:22px 20px calc(26px + var(--sb));border:1px solid var(--stroke);max-height:85vh;overflow-y:auto}
.sheet h3{margin:0 0 4px;font-size:18px}.sheet p{margin:0 0 14px;color:var(--txt-dim);font-size:13px;line-height:1.5}
.sheet label{display:block;font-size:12px;color:var(--txt-dim);margin-bottom:5px;margin-top:12px}
.sheet input{width:100%;background:var(--bg);border:1px solid var(--stroke-hi);color:var(--txt);border-radius:11px;padding:13px;font-size:14px;font-family:inherit;outline:none}
.sheet input:focus{border-color:var(--accent)}
.sheet .btns{display:flex;gap:10px;margin-top:16px}
.sheet button{flex:1;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}
.sheet .save{background:var(--accent);color:#fff}.sheet .close{background:var(--surface-hi);color:var(--txt)}
.toast{position:fixed;bottom:calc(110px + var(--sb));left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--stroke-hi);color:var(--txt);padding:13px 20px;border-radius:13px;font-size:14px;z-index:90;opacity:0;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.5);max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="topbar"><div class="inner">
  <div class="prow"><b>Прогрес дня</b><span id="ppct">0%</span></div>
  <div class="ptrack"><div class="pfill" id="pfill"></div></div>
</div></div>
<div class="wrap">
  <div class="hero">
    <a href="okr.html" class="gear" style="right:52px;font-size:13px;font-weight:700;color:var(--accent)">OKR</a>
    <div class="gear" onclick="openSettings()">⚙</div>
    <div class="hi">Привіт, <span class="name">Ілля</span>!</div>
    <div class="sub">Зараз <span class="clk" id="clock">--:--</span> · <span id="dateline">—</span></div>
    <div class="sub" id="greetline" style="margin-top:2px"></div>
  </div>
  <div class="cards">
    <div class="ccard c-madrid" id="madrid"></div>
    <div class="ccard c-weekend" id="weekend"></div>
  </div>
  <div class="wx" id="wxBlock" style="display:none"></div>
  <div id="app"></div>
</div>
<div class="submitbar"><div class="inner">
  <button class="send" id="sendBtn" onclick="submitDay()"><span id="sendTxt">Закрити день · Відправити звіт</span></button>
</div></div>
<div class="modal" id="modal"><div class="sheet">
  <h3>Налаштування</h3><p>Зберігаються локально на цьому пристрої.</p>
  <label>Webhook (Apps Script / Make / Zapier)</label>
  <input id="hookInput" placeholder="https://script.google.com/.../exec"/>
  <label>OpenWeather API Key <a href="https://openweathermap.org/api" target="_blank" style="color:var(--accent);font-size:11px">(отримати)</a></label>
  <input id="wxKeyInput" placeholder="abc123…"/>
  <div class="btns"><button class="close" onclick="closeSettings()">Скасувати</button><button class="save" onclick="saveSettings()">Зберегти</button></div>
</div></div>
<div class="toast" id="toast"></div>

<script>
const KEY='routine_v3',HOOKKEY='routine_hook_v1',WXKEY='routine_wx_key',STRKEY='routine_streaks_v1';
const ODESA={lat:46.4825,lon:30.7233};
const MADRID_DATE=new Date(2026,7,24);
const CUPS=10;

const checksMorning=[['noPhone','Ноу телефону при прокиданні'],['skincareAM','Скінкер (зранку)'],['coldShower','Холодний душ'],
 ['water05wake','0.5 води після прокидання'],['morningLight','Ранкове світло (вулиця 15+ хв)'],['drops','Каплі очі та ніс'],
 ['breakfast','Сніданок насичений'],['vitDB','Вітамін Д та Б'],['proteinCreatine','Протеїн + Креатин']];
const checksDay=[['water05lunch','Вода 0.5 до обіду'],['lunch','Обід плотний'],['magDay','Магній (1 таб. вдень)']];
const checksEvening=[['dinner','Вечеря'],['skincarePM','Вечірній скінкер'],['magNight','Магній (2 таб. на ніч)']];
const allChecks=[...checksMorning,...checksDay,...checksEvening];
const luFeed=[['lu1','Годування 1','04:30'],['lu2','Годування 2','08:30'],['lu3','Годування 3','12:30'],['lu4','Годування 4','16:30'],['lu5','Годування 5','20:30']];
const tiktok=[['tt6','ТікТок 6 ранку','06:00'],['tt12','ТікТок 12 дня','12:00'],['tt18','ТікТок 18 дня','18:00']];

const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const yesterday=()=>{const d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const tomorrow=()=>{const d=new Date();d.setDate(d.getDate()+1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};

function fresh(){return{date:today(),bed:'',wake:'',sleepH:'',water:0,
  checks:{},toggles:{sea:null,steps:null},notes:{},
  sliders:{vibe:5,stress:5,social:5},
  text:{lightWork:'',whereWork:'',foodNotes:'',hobby:'',workH:''},
  money:{amount:'',desc:''},
  expenses:[],
  body:{morning:'',day:'',evening:''},
  work:{bigCount:'',bigDesc:'',smallCount:'',smallDesc:''},
  timeline:'',planTomorrow:'',
  weather:{morning:null,day:null,evening:null,pressureAlert:false},
  _closed:{}}}

function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.date===today())return s}catch(e){}return fresh()}
let S=load();
// migrate from v2
if(!S.body)S.body={morning:'',day:'',evening:''};
if(!S.money)S.money={amount:S.text?.money||'',desc:''};
if(!S.expenses)S.expenses=[];
if(S.timeline===undefined)S.timeline='';
if(S.planTomorrow===undefined)S.planTomorrow='';
function save(){localStorage.setItem(KEY,JSON.stringify(S))}

/* ═══════ STREAKS ═══════ */
function loadStreaks(){try{return JSON.parse(localStorage.getItem(STRKEY))||{}}catch(e){return{}}}
function saveStreaks(st){localStorage.setItem(STRKEY,JSON.stringify(st))}
function getStreak(key){const st=loadStreaks(),e=st[key];if(!e)return 0;if(e.last===today()||e.last===yesterday())return e.count;return 0}
function updateAllStreaks(){
  const st=loadStreaks(),d=today(),yd=yesterday();
  [...allChecks.map(c=>c[0]),...luFeed.map(c=>c[0]),...tiktok.map(c=>c[0])].forEach(k=>{
    const checked=!!S.checks[k];if(!st[k])st[k]={count:0,last:''};
    if(checked){if(st[k].last===yd){st[k].count++;st[k].last=d}else if(st[k].last!==d){st[k].count=1;st[k].last=d}}
    else{if(st[k].last===d){st[k].count=0;st[k].last=''}}});
  saveStreaks(st)}

/* ═══════ CLOCK ═══════ */
const dayN=['неділя','понеділок','вівторок','середа','четвер','пʼятниця','субота'];
const monN=['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];
function tick(){
  const d=new Date();
  document.getElementById('clock').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  document.getElementById('dateline').textContent=dayN[d.getDay()]+', '+d.getDate()+' '+monN[d.getMonth()];
  const h=d.getHours();
  document.getElementById('greetline').textContent=h<6?'Глибока ніч.':h<11?'Ранок задає тон.':h<16?'Розпал дня.':h<21?'Вечоріє.':'Кінець дня.';
  renderCountdowns()}
setInterval(tick,60000);tick();

function renderCountdowns(){
  const now=new Date(),md=Math.ceil((MADRID_DATE-now)/864e5);
  document.getElementById('madrid').innerHTML=`<div class="lbl">✈️ Мадрід</div><div class="big">${md>0?md:'🎉'}</div><div class="unit">${md>0?'днів до подорожі':'Час настав!'}</div>`;
  const day=now.getDay();let toSat=(6-day)%7;if(toSat===0&&now.getHours()>=21)toSat=7;
  document.getElementById('weekend').innerHTML=`<div class="lbl">🌴 Вихідні</div><div class="big">${toSat}</div><div class="unit">${toSat===0?'сьогодні!':'днів'}</div>`}

/* ═══════ WEATHER ═══════ */
async function fetchWeather(){
  const apiKey=localStorage.getItem(WXKEY);if(!apiKey)return;
  try{const r=await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${ODESA.lat}&lon=${ODESA.lon}&appid=${apiKey}&units=metric&lang=uk`);
    if(!r.ok)return;const data=await r.json();const ts=today();const slots=data.list.filter(i=>i.dt_txt.startsWith(ts));
    const pick=h=>{let best=null,minD=99;slots.forEach(s=>{const sh=parseInt(s.dt_txt.split(' ')[1]);const d=Math.abs(sh-h);if(d<minD){minD=d;best=s}});
      if(!best&&data.list.length)best=data.list[0];if(!best)return null;
      return{temp:Math.round(best.main.temp),desc:best.weather[0].description,pressure:Math.round(best.main.pressure*0.750062)}};
    S.weather.morning=pick(9);S.weather.day=pick(15);S.weather.evening=pick(21);
    S.weather.pressureAlert=false;
    const pts=[S.weather.morning,S.weather.day,S.weather.evening].filter(Boolean).map(p=>p.pressure);
    for(let i=1;i<pts.length;i++){if(Math.abs(pts[i]-pts[i-1])>=4){S.weather.pressureAlert=true;break}}
    save();renderWeather();}catch(e){}}
function renderWeather(){
  const w=S.weather,b=document.getElementById('wxBlock');
  if(!w.morning&&!w.day&&!w.evening){b.style.display='none';return}b.style.display='block';
  const cell=(l,d)=>d?`<div class="wx-cell"><div class="wtime">${l}</div><div class="wtemp">${d.temp}°</div><div class="wdesc">${d.desc}</div><div class="wpres">${d.pressure} мм</div></div>`
    :`<div class="wx-cell"><div class="wtime">${l}</div><div class="wdesc">—</div></div>`;
  b.innerHTML=`<div class="wx-title">🌤 Погода · Одеса</div><div class="wx-grid">${cell('ранок',w.morning)}${cell('день',w.day)}${cell('вечір',w.evening)}</div>
    <div class="wx-alert ${w.pressureAlert?'show':''}">⚠️ Перепад тиску >4 мм — зверни увагу на воду та магній</div>`;
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('alert-sec'));
  if(w.pressureAlert){['secDay','secEvening'].forEach(id=>{const el=document.querySelector(`[data-sec="${id}"]`);if(el)el.classList.add('alert-sec')})}}

function calcSleep(){if(!S.bed||!S.wake)return;const[bh,bm]=S.bed.split(':').map(Number),[wh,wm]=S.wake.split(':').map(Number);
  const diff=(wh*60+wm)>(bh*60+bm)?(wh*60+wm-bh*60-bm):(1440-bh*60-bm+wh*60+wm);
  S.sleepH=(diff/60).toFixed(1).replace(/\.0$/,'');save();const el=document.getElementById('sleepVal');if(el)el.textContent=S.sleepH}

/* ═══════ RENDER ═══════ */
const chkSvg='<svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg>';
function streakBadge(k){const c=getStreak(k);return`<div class="streak ${c>0?'on':''}">🔥${c}</div>`}
function chkRow(k,l,t){const on=S.checks[k]?'on':'',hn=S.notes[k]?'has':'';
  return`<div class="chk ${on}" data-k="${k}" onclick="toggleChk(this)"><div class="box">${chkSvg}</div>${streakBadge(k)}
    <div class="lab">${l}</div>${t?`<div class="tm">${t}</div>`:''}<div class="nbtn ${hn}" onclick="event.stopPropagation();toggleNote('${k}')">📝</div></div>
    <div class="note-row" data-nk="${k}"><input placeholder="нотатка…" value="${S.notes[k]||''}" oninput="setNote('${k}',this.value)" onclick="event.stopPropagation()"/></div>`}
function textFull(k,l,ph,area=false){const v=S.text[k]||'';return`<div class="field full"><label>${l}</label>
  ${area?`<textarea placeholder="${ph}" oninput="setText('${k}',this.value)">${v}</textarea>`:`<input type="text" value="${v}" placeholder="${ph}" oninput="setText('${k}',this.value)"/>`}</div>`}
function numText(k,l,ph){const v=S.text[k]||'';return`<div class="field"><label>${l}</label><input type="number" value="${v}" placeholder="${ph}" oninput="setText('${k}',this.value)"/></div>`}
function toggle(k,l){const v=S.toggles[k];return`<div class="toggle"><div class="lab">${l}</div><div class="seg">
  <button class="yes ${v===true?'act':''}" onclick="setTog('${k}',true,this)">Так</button>
  <button class="no ${v===false?'act':''}" onclick="setTog('${k}',false,this)">Ні</button></div>
  <div class="nbtn ${S.notes[k]?'has':''}" onclick="toggleNote('${k}')">📝</div></div>
  <div class="note-row" data-nk="${k}"><input placeholder="нотатка…" value="${S.notes[k]||''}" oninput="setNote('${k}',this.value)"/></div>`}
function slider(k,l){const v=S.sliders[k];return`<div class="slider"><div class="row"><b>${l}</b><span class="val" id="v_${k}">${v}</span></div>
  <input type="range" min="1" max="10" value="${v}" oninput="setSlide('${k}',this.value)"/></div>`}
function section(id,ic,ti,sub,body,ec=''){const cl=S._closed&&S._closed[id]?'closed':'';
  return`<div class="sec ${ec} ${cl}" data-sec="${id}"><div class="sec-h" onclick="toggleSec('${id}')">
    <div class="ic">${ic}</div><div class="ti"><b>${ti}</b><small>${sub}</small></div>
    <div class="cnt" id="cnt_${id}"></div><div class="chev">▾</div></div><div class="sec-b">${body}</div></div>`}

function catWidget(){const fed=luFeed.filter(c=>S.checks[c[0]]).length;let face,msg,extra='';
  if(fed===0){face='😴';msg='Лютік спить…';extra='<div class="cat-zzz">z</div>'}
  else if(fed<=2){face='🐱';msg='Лютік прокинувся. Ще голодний!'}
  else if(fed<=4){face='😺';msg='Лютік задоволений!';extra='<div class="cat-tail wag">〰️</div>'}
  else{face='😻';msg='Усі годування ✓';extra='<div class="cat-hearts"><span class="cat-heart">💜</span><span class="cat-heart">💜</span><span class="cat-heart">💜</span></div>'}
  return`<div class="cat-wrap"><div class="cat"><div class="cat-body">${face}</div>${extra}</div><div class="cat-msg">${msg}</div></div>`}

function walletWidget(){
  const total=S.expenses.reduce((s,e)=>s+(Number(e.amt)||0),0);
  const display=total?total.toLocaleString('uk'):'0';
  let rows=S.expenses.map((e,i)=>`<div class="exp-row">
    <input class="exp-amt" type="number" value="${e.amt||''}" placeholder="грн" oninput="S.expenses[${i}].amt=this.value;save();updateWalletTotal()"/>
    <input class="exp-desc" type="text" value="${e.desc||''}" placeholder="на що…" oninput="S.expenses[${i}].desc=this.value;save()"/>
    <button class="exp-del" onclick="S.expenses.splice(${i},1);save();render()">✕</button></div>`).join('');
  return`<div class="wallet"><div class="wallet-head"><div class="wallet-ic">💸</div>
    <div class="wallet-sum"><div class="wlbl">витрати за день</div><div class="wval" id="walletTotal">${display} <span>грн</span></div></div></div>
    <div class="exp-list">${rows}</div>
    <button class="exp-add" onclick="S.expenses.push({amt:'',desc:''});save();render()">+ Додати витрату</button></div>`}

function bodyWidget(){
  return`<div class="body-grid">
    <div class="body-col"><div class="blbl">🌅 Ранок</div><textarea placeholder="голова, тиск, самопочуття…" oninput="S.body.morning=this.value;save()">${S.body.morning||''}</textarea></div>
    <div class="body-col"><div class="blbl">☀️ День</div><textarea placeholder="як себе відчуваю…" oninput="S.body.day=this.value;save()">${S.body.day||''}</textarea></div>
    <div class="body-col"><div class="blbl">🌙 Вечір</div><textarea placeholder="стан під кінець дня…" oninput="S.body.evening=this.value;save()">${S.body.evening||''}</textarea></div></div>`}

function timelineWidget(){
  return`<div class="timeline-box"><textarea placeholder="09:00 — прокинувся, зарядка\n10:00 — робота ENKO\n13:00 — обід, прогулянка\n15:00 — коледж\n…" oninput="S.timeline=this.value;save()">${S.timeline||''}</textarea></div>
  <div class="timeline-hint">Записуй блоками що робив протягом дня</div>`}

function planWidget(){
  const tmr=tomorrow();const d=new Date();d.setDate(d.getDate()+1);
  const tmrLabel=dayN[d.getDay()]+', '+d.getDate()+' '+monN[d.getMonth()];
  return`<div class="plan-card"><div class="plan-head"><div class="pic">📅</div>
    <div class="pinfo"><b>План на завтра</b><small>${tmrLabel}</small></div></div>
    <textarea placeholder="головні задачі, зустрічі, фокус дня…" oninput="S.planTomorrow=this.value;save()">${S.planTomorrow||''}</textarea></div>`}

function render(){
  const sleepBlock=`<div class="sleep-row"><div class="sleep-col"><label>Ліг спати</label><input type="time" value="${S.bed}" onchange="S.bed=this.value;calcSleep();save()"/></div>
    <div class="sleep-col"><label>Прокинувся</label><input type="time" value="${S.wake}" onchange="S.wake=this.value;calcSleep();save()"/></div></div>
    <div class="sleep-result"><div class="big" id="sleepVal">${S.sleepH||'—'}</div><div class="unit">годин сну</div></div>`;
  const morningBody=sleepBlock+checksMorning.map(c=>chkRow(c[0],c[1])).join('');

  const waterBlock=`<div class="water"><div class="cups" id="cups">
    ${Array.from({length:CUPS}).map((_,i)=>`<div class="cup ${i<S.water?'on':''}" onclick="setWater(${i+1})"><div class="fill"></div></div>`).join('')}
    </div><div class="wmeta"><b id="wml">${S.water*200}</b> мл · <span id="wcups">${S.water}</span>/${CUPS} склянок</div></div>`;

  const workFields=`${textFull('lightWork','Світло при роботі','яскраве, біля вікна')}${textFull('whereWork','Де працював','дім / кафе / коворкінг')}
    ${textFull('foodNotes','Харчування (нотатки)','що їв',true)}${numText('workH','Годин пропрацював','6')}${textFull('hobby','Музика / Хобі','',true)}`;
  const dayBody=checksDay.map(c=>chkRow(c[0],c[1])).join('')+waterBlock+workFields;

  const eveningBody=checksEvening.map(c=>chkRow(c[0],c[1])).join('')+toggle('sea','Поїздка на море?')+toggle('steps','10к+ кроків?');
  const luBody=catWidget()+luFeed.map(c=>chkRow(c[0],c[1],c[2])).join('');
  const ttBody=tiktok.map(c=>chkRow(c[0],c[1],c[2])).join('');
  const tasksBody=`<div class="taskrow"><div class="tcol"><label>Великих тасок закрито</label><input type="number" value="${S.work.bigCount}" placeholder="0" oninput="S.work.bigCount=this.value;save()"/></div></div>
    <div class="field full"><label>Опис великих тасок</label><textarea placeholder="що саме…" oninput="S.work.bigDesc=this.value;save()">${S.work.bigDesc||''}</textarea></div>
    <div class="taskrow"><div class="tcol"><label>Маленьких тасок закрито</label><input type="number" value="${S.work.smallCount}" placeholder="0" oninput="S.work.smallCount=this.value;save()"/></div></div>
    <div class="field full"><label>Опис маленьких тасок</label><textarea placeholder="що саме…" oninput="S.work.smallDesc=this.value;save()">${S.work.smallDesc||''}</textarea></div>`;
  const slidersBody=slider('vibe','Vibe Check')+slider('stress','Stress Level')+slider('social','Social Battery');

  document.getElementById('app').innerHTML=
    section('secMorning','🌅','Ранок','пробудження & рутина',morningBody)
    +section('secDay','☀️','День','харчування · вода · робота',dayBody)
    +section('secEvening','🌙','Вечір','вечірня рутина & тригери',eveningBody)
    +section('secBody','🩺','Фізичний стан','голова · тиск · самопочуття',bodyWidget())
    +section('secWallet','💸','Витрати','гаманець дня',walletWidget())
    +section('secLu','🐱','Лютік','годування по розкладу',luBody,'warm')
    +section('secTT','🎬','ТікТок таймінг','контент-контроль',ttBody)
    +section('secTasks','📊','Робочі таски','великі та маленькі',tasksBody)
    +section('secMind','🧠','Психоемоційні метрики','рефлексія',slidersBody)
    +section('secTimeline','📝','Таймлайн дня','що робив блоками',timelineWidget())
    +section('secPlan','📅','План на завтра','підготовка',planWidget());
  updateProgress();renderWeather()}

/* ═══════ INTERACTIONS ═══════ */
function haptic(ms=12){if(navigator.vibrate)navigator.vibrate(ms)}
function toggleChk(el){const k=el.dataset.k,now=!S.checks[k];S.checks[k]=now;el.classList.toggle('on',now);
  if(now){haptic();burst(el)}save();updateProgress();
  if(k.startsWith('lu')){const cw=document.querySelector('.cat-wrap');if(cw)cw.outerHTML=catWidget()}}
function setWater(n){S.water=(S.water===n)?n-1:n;haptic();
  document.querySelectorAll('#cups .cup').forEach((c,i)=>c.classList.toggle('on',i<S.water));
  document.getElementById('wml').textContent=S.water*200;document.getElementById('wcups').textContent=S.water;
  if(S.water===CUPS)burst(document.getElementById('cups'));save();updateProgress()}
function setTog(k,v,btn){S.toggles[k]=v;haptic();const seg=btn.parentElement;seg.querySelector('.yes').classList.toggle('act',v===true);
  seg.querySelector('.no').classList.toggle('act',v===false);if(v)burst(btn);save();updateProgress()}
function setSlide(k,v){S.sliders[k]=+v;document.getElementById('v_'+k).textContent=v;save()}
function setText(k,v){S.text[k]=v;save();updateProgress()}
function setNote(k,v){if(v)S.notes[k]=v;else delete S.notes[k];save()}
function updateWalletTotal(){const t=S.expenses.reduce((s,e)=>s+(Number(e.amt)||0),0);
  const el=document.getElementById('walletTotal');if(el)el.innerHTML=t.toLocaleString('uk')+' <span>грн</span>'}
function toggleNote(k){const row=document.querySelector(`.note-row[data-nk="${k}"]`);if(row){row.classList.toggle('open');if(row.classList.contains('open'))row.querySelector('input').focus()}}
function toggleSec(id){S._closed=S._closed||{};S._closed[id]=!S._closed[id];document.querySelector(`[data-sec="${id}"]`).classList.toggle('closed',S._closed[id]);save()}

/* ═══════ PROGRESS ═══════ */
function updateProgress(){
  let done=0,total=0;
  [...allChecks.map(c=>c[0]),...luFeed.map(c=>c[0]),...tiktok.map(c=>c[0])].forEach(k=>{total++;if(S.checks[k])done++});
  total+=CUPS;done+=S.water;
  ['sea','steps'].forEach(k=>{total++;if(S.toggles[k]!==null)done++});
  ['bed','wake'].forEach(k=>{total++;if(S[k])done++});
  Object.keys(S.text).forEach(k=>{total++;if(String(S.text[k]).trim())done++});
  const pct=Math.round(done/total*100);
  document.getElementById('pfill').style.width=pct+'%';document.getElementById('ppct').textContent=pct+'%';
  setCnt('secMorning',checksMorning.filter(c=>S.checks[c[0]]).length+(S.bed?1:0)+(S.wake?1:0),checksMorning.length+2);
  setCnt('secDay',checksDay.filter(c=>S.checks[c[0]]).length+S.water,checksDay.length+CUPS);
  setCnt('secEvening',checksEvening.filter(c=>S.checks[c[0]]).length+['sea','steps'].filter(k=>S.toggles[k]!==null).length,checksEvening.length+2);
  setCnt('secLu',luFeed.filter(c=>S.checks[c[0]]).length,luFeed.length);
  setCnt('secTT',tiktok.filter(c=>S.checks[c[0]]).length,tiktok.length)}
function setCnt(id,a,b){const e=document.getElementById('cnt_'+id);if(e)e.textContent=a+'/'+b}

/* ═══════ CONFETTI ═══════ */
const COL=['#7c5cff','#22d3ee','#34e0a1','#ffb84d','#ff6b9d'];
function burst(a){const r=a.getBoundingClientRect(),x=r.left+r.width/2,y=r.top+r.height/2;
  for(let i=0;i<14;i++){const p=document.createElement('div');p.className='confetti';p.style.background=COL[i%COL.length];document.body.appendChild(p);
    const ang=Math.random()*Math.PI*2,dist=40+Math.random()*70,dx=Math.cos(ang)*dist,dy=Math.sin(ang)*dist-30;
    p.animate([{transform:`translate(${x}px,${y}px) rotate(0deg)`,opacity:1},{transform:`translate(${x+dx}px,${y+dy+120}px) rotate(${Math.random()*540}deg)`,opacity:0}],
      {duration:700+Math.random()*400,easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=()=>p.remove()}}
function bigBurst(){const c={getBoundingClientRect:()=>({left:innerWidth/2,top:innerHeight*.4,width:0,height:0})};for(let k=0;k<4;k++)setTimeout(()=>burst(c),k*120)}

/* ═══════ SETTINGS ═══════ */
function openSettings(){document.getElementById('hookInput').value=localStorage.getItem(HOOKKEY)||'';document.getElementById('wxKeyInput').value=localStorage.getItem(WXKEY)||'';document.getElementById('modal').classList.add('open')}
function closeSettings(){document.getElementById('modal').classList.remove('open')}
function saveSettings(){localStorage.setItem(HOOKKEY,document.getElementById('hookInput').value.trim());localStorage.setItem(WXKEY,document.getElementById('wxKeyInput').value.trim());closeSettings();toast('Збережено');fetchWeather()}
let tt_=0;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt_);tt_=setTimeout(()=>t.classList.remove('show'),2600)}

/* ═══════ PAYLOAD ═══════ */
function buildPayload(){
  const b=v=>v?1:0,tog=v=>v===true?'Так':v===false?'Ні':'';
  const p={'Дата':S.date,'Сон (год)':S.sleepH,'Час ліг':S.bed,'Час встав':S.wake};
  allChecks.forEach(c=>p[c[1]]=b(S.checks[c[0]]));
  p['Вода (мл)']=S.water*200;p['Вода (склянок)']=S.water;
  p['Море']=tog(S.toggles.sea);p['10к кроків']=tog(S.toggles.steps);
  luFeed.forEach(c=>p['Лютік '+c[2]]=b(S.checks[c[0]]));
  tiktok.forEach(c=>p[c[1]]=b(S.checks[c[0]]));
  p['Світло (робота)']=S.text.lightWork;p['Де працював']=S.text.whereWork;
  p['Харчування нотатки']=S.text.foodNotes;p['Робота (год)']=S.text.workH;p['Хобі/музика']=S.text.hobby;
  p['Витрати (грн)']=S.expenses.reduce((s,e)=>s+(Number(e.amt)||0),0);
  p['Деталі витрат']=S.expenses.filter(e=>e.amt||e.desc).map(e=>(e.amt||'0')+' грн — '+(e.desc||'без опису')).join('\n');
  p['Стан ранок']=S.body.morning;p['Стан день']=S.body.day;p['Стан вечір']=S.body.evening;
  p['Великих тасок']=S.work.bigCount;p['Великі таски опис']=S.work.bigDesc;
  p['Маленьких тасок']=S.work.smallCount;p['Маленькі таски опис']=S.work.smallDesc;
  p['Vibe']=S.sliders.vibe;p['Stress']=S.sliders.stress;p['Social']=S.sliders.social;
  p['Таймлайн дня']=S.timeline;p['План на завтра']=S.planTomorrow;
  const wx=S.weather;['morning','day','evening'].forEach((t,i)=>{const l=['Ранок','День','Вечір'][i];
    if(wx[t]){p['Погода '+l]=wx[t].temp+'° '+wx[t].desc;p['Тиск '+l+' (мм)']=wx[t].pressure}else{p['Погода '+l]='';p['Тиск '+l+' (мм)']=''}});
  p['Перепад тиску']=wx.pressureAlert?'Так':'Ні';
  const noteLines=Object.entries(S.notes).filter(([,v])=>v).map(([k,v])=>{
    const lab=allChecks.find(c=>c[0]===k)?.[1]||luFeed.find(c=>c[0]===k)?.[1]||tiktok.find(c=>c[0]===k)?.[1]||k;return lab+': '+v});
  p['Нотатки']=noteLines.join('\n');
  const st=loadStreaks();const top5=Object.entries(st).filter(([,v])=>v.count>0).sort((a,b)=>b[1].count-a[1].count).slice(0,5);
  p['Топ стріки']=top5.map(([k,v])=>{const lab=allChecks.find(c=>c[0]===k)?.[1]||luFeed.find(c=>c[0]===k)?.[1]||k;return lab+' '+v.count+'д'}).join(', ');
  return p}

/* ═══════ SUBMIT ═══════ */
async function submitDay(){
  const hook=localStorage.getItem(HOOKKEY),btn=document.getElementById('sendBtn'),txt=document.getElementById('sendTxt');
  updateAllStreaks();const payload=buildPayload();
  if(!hook){try{await navigator.clipboard.writeText(JSON.stringify(payload,null,2))}catch(e){}toast('Webhook не підключено. JSON скопійовано.');openSettings();return}
  btn.classList.add('busy');txt.textContent='Відправляю…';
  try{await fetch(hook,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    btn.classList.remove('busy');btn.classList.add('ok');txt.textContent='День відправлено ✓';haptic(40);bigBurst();
    setTimeout(()=>{btn.classList.remove('ok');txt.textContent='Закрити день · Відправити звіт'},3500);
  }catch(e){btn.classList.remove('busy');txt.textContent='Закрити день · Відправити звіт';toast('Помилка мережі.')}}

render();fetchWeather();
</script>
