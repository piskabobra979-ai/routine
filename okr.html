<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>OKR Dashboard</title>
<style>
:root{--bg:#0a0a0f;--bg2:#12121c;--surface:rgba(255,255,255,.035);--surface-hi:rgba(255,255,255,.06);
  --stroke:rgba(255,255,255,.08);--stroke-hi:rgba(255,255,255,.16);
  --txt:#f2f3f7;--txt-dim:#8b8d9c;--txt-faint:#5a5c6b;--r:16px;--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 80% -10%,rgba(124,92,255,.12),transparent 60%),
  radial-gradient(900px 500px at -10% 10%,rgba(34,211,238,.08),transparent 55%),var(--bg);
  color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:calc(80px + var(--sb))}
.wrap{max-width:680px;margin:0 auto;padding:0 14px}
.nav{display:flex;align-items:center;gap:12px;padding:16px 14px;position:sticky;top:0;z-index:40;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  background:linear-gradient(to bottom,rgba(10,10,15,.92),rgba(10,10,15,.55));border-bottom:1px solid var(--stroke)}
.nav .inner{max-width:680px;margin:0 auto;width:100%;display:flex;align-items:center;gap:12px}
.nav a{color:var(--txt-dim);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--stroke)}
.nav h1{flex:1;font-size:18px;font-weight:700;margin:0}
.overall{text-align:center;padding:24px 16px 8px}
.overall .pct{font-size:40px;font-weight:800;font-variant-numeric:tabular-nums;
  background:linear-gradient(90deg,#7c5cff,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
.overall .lbl{font-size:13px;color:var(--txt-dim);margin-top:2px}
.filters{display:flex;gap:7px;overflow-x:auto;padding:10px 0 14px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex:none;border:1px solid var(--stroke-hi);background:var(--surface);color:var(--txt-dim);
  padding:6px 13px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.fbtn.act{color:#fff}
.catblock{margin:16px 0 24px}
.cathead{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;user-select:none}
.cathead .cic{font-size:18px}.cathead b{font-size:16px;font-weight:700;flex:1}
.cathead .cpct{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.cathead .chev{color:var(--txt-faint);font-size:12px;transition:transform .3s}
.catblock.closed .cathead .chev{transform:rotate(-90deg)}
.catblock.closed .catbody{display:none}
.obj{background:var(--surface);border:1px solid var(--stroke);border-radius:var(--r);margin:10px 0;overflow:hidden}
.obj-h{padding:14px 16px;cursor:pointer;user-select:none;display:flex;gap:12px;align-items:flex-start}
.obj-h .onum{font-size:12px;font-weight:800;padding:3px 8px;border-radius:7px;flex:none;margin-top:2px}
.obj-h .otxt{flex:1;font-size:14.5px;font-weight:600;line-height:1.35}
.obj-h .opct{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;flex:none;margin-top:2px}
.obj-h .ochev{color:var(--txt-faint);font-size:11px;flex:none;margin-top:4px;transition:transform .3s}
.obj.closed .ochev{transform:rotate(-90deg)}.obj.closed .obj-b{display:none}
.obj-b{padding:0 14px 14px}
.pbar{height:6px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.22,1,.36,1)}
.kr{border-top:1px solid var(--stroke);padding:12px 0 8px}.kr:first-child{border-top:none}
.kr-head{display:flex;align-items:flex-start;gap:10px}
.kr-tag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;flex:none;margin-top:2px}
.kr-txt{flex:1;font-size:13.5px;line-height:1.4}
.kr-pct{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;flex:none;margin-top:1px}
.kr-slider{display:flex;align-items:center;gap:10px;margin-top:8px}
.kr-slider input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;background:rgba(255,255,255,.08);outline:none}
.kr-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--txt);cursor:pointer;border:3px solid #7c5cff;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.kt{padding:6px 0 4px 24px;position:relative}
.kt::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;border-radius:2px;background:rgba(255,255,255,.06)}
.kt-dot{position:absolute;left:5px;top:11px;width:8px;height:8px;border-radius:50%;border:2px solid var(--stroke-hi);background:var(--bg2);cursor:pointer;transition:all .2s}
.kt-dot.done{background:#34e0a1;border-color:#34e0a1;box-shadow:0 0 8px rgba(52,224,161,.4)}
.kt-txt{font-size:12.5px;color:var(--txt-dim);line-height:1.4;cursor:pointer;transition:color .2s;padding-left:6px}
.kt-txt.done{color:var(--txt-faint);text-decoration:line-through}
.submitbar{position:fixed;left:0;right:0;bottom:0;z-index:50;padding:12px 16px calc(12px + var(--sb));
  background:linear-gradient(to top,rgba(10,10,15,.98) 60%,transparent)}
.submitbar .inner{max-width:680px;margin:0 auto}
.sendbtn{width:100%;border:none;border-radius:15px;padding:16px;font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;color:#fff;background:linear-gradient(90deg,#7c5cff,#9d6bff);box-shadow:0 8px 28px rgba(124,92,255,.4);
  transition:transform .12s,opacity .2s}
.sendbtn:active{transform:scale(.97)}.sendbtn.busy{opacity:.6;pointer-events:none}
.sendbtn.ok{background:linear-gradient(90deg,#34e0a1,#2bc98f)}
.toast{position:fixed;bottom:calc(100px + var(--sb));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg2);border:1px solid var(--stroke-hi);color:var(--txt);padding:13px 20px;border-radius:13px;
  font-size:14px;z-index:90;opacity:0;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.5);max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

    {text:'KR1 (Incoming Sugar): 0 скарг; закриті інтеграції; задоволеність Каті (CEO); повністю описаний і працюючий скрипт/процес обробки вхідних.',kts:['Inbox Zero: Перевірка та відповідь на всі запити тричі на день (ранок/обід/вечір), щоб не втрачати "теплий" стан клієнта.','Follow-up Map: Створення простої сітки фоловапів (через 24г, 3 дні, 1 тиждень) для кожного вхідного ліда.','Status Sync: Раз на тиждень короткий чек-лист для Шугара про статус найважливіших запитів.']},

  {text:'Набути впевнених практичних навичок водіння на механіці та базових знань ПДР для повної готовності до офіційного складання іспитів. (до січня 2027)',krs:[

    {text:'KR2: Стабільне проходження теоретичних тестів ПДР онлайн з результатом 18/20 або вище.',kts:['Проводити 1–3 практичні заняття з татом на тиждень (тривалістю 1+ година) на майданчиках/парковках, починаючи з березня.','Відпрацювати всі види паркування, маневри, повороти та екстрене гальмування до автоматизму.','Протягом літа раз на тиждень проходити онлайн-тести ПДР для закріплення бази.','Грудень 2026 записатися на теоретичний екзамен в січні 2027 та практичні заняття.']},

  {text:'Побудувати фундаментальну базу кулінарних знань та навичок для забезпечення власного побутового комфорту та здоров\'я.',krs:[
    {text:'KR1: Сформовано особистий «рецептурний чек-лист» з 15+ базових повноцінних страв (сніданки, обіди, вечері), які ти готуєш впевнено.',kts:[]},
    {text:'KR2: Повне розуміння поєднання інгредієнтів, технік обробки продуктів (жарка, варка, запікання) та вміння складати кошик продуктів на тиждень до 15.09.2026.',kts:['Проводити «Кулінарний експеримент» раз на 1–2 тижні: готувати нову страву за туторіалами з YouTube або під керівництвом сім’ї.','Вести нотатку «Мій раціон» (Notion або телефон), куди записувати перевірені рецепти, час приготування та список продуктів для них.','Активно консультуватися з сімʼєю щодо «кухонних лайфхаків» (як обирати м’ясо/овочі, як зберігати продукти).']},

  {text:'Побудувати систему «Life Ops» для автономного керування своїм здоров\'ям, фінансами та житловим простором.',krs:[
    {text:'KR1 (Finance & Engineering): Розуміння циклу оплати комунальних послуг, зняття показників лічильників та логіки роботи електрощитка/водопостачання.',kts:[]},
    {text:'KR2 (Health Literacy): Сформована «Базова аптечка» та знання основних груп ліків (знеболювальні, антисептики, сорбенти) та їх дії.',kts:[]},
    {text:'KR3 (Domestic Care): Знання маркувань на одязі (як не зіпсувати речі при пранні) та базових засобів побутової хімії для різних поверхонь.',kts:[]},
    {text:'KR4: Дізнатися про напругу електрику, фізику і так далі в побутовому житті.',kts:['Протягом лютого–березня разом із батьками пройти весь цикл: від зняття показників лічильників до оплати в додатку/кабінеті.','Разом із сім\'єю провести ревізію домашньої аптечки, розібратися, що для чого, і створити свій список «Must-have» ліків (з фокусом на діючу речовину).','Дізнатися, де в поточному житлі знаходяться головні крани перекриття води та електрощиток. Навчитися користуватися базовими інструментами (викрутка, фум-лента, тестер напруги).','Скласти міні-гайд (або завантажити в бот) значення символів на ярликах одягу, щоб автоматизувати процес прання. Дізнатися про фізику в побутовому житті.']},
  ]},
  {text:'Стати людиною з широким світоглядом, здатною підтримати інтелектуальну дискусію на будь-яку тему поза межами професійної діяльності.',krs:[
    {text:'KR1 (Information Quality): Заміна 50% розважального контенту (соцмережі) на пізнавальний (Longreads, документальні фільми, лекції).',kts:['Щодня приділяти 20 хвилин вивченню теми, яка ніяк не пов\'язана з роботою (наприклад: як працює блокчейн, історія Одеси, будова двигуна внутрішнього згоряння, теорія ігор).','Підписатися на 3 якісних медіа або YouTube-канали про науку/історію/технології (наприклад: *Kurzgesagt, Veritasium, WAS* або подкасти про історію).','Щоразу, коли чуєш незрозумілий термін або посилання на подію від старших колег — не кивай головою, а записуй і ввечері приділи 5 хвилин, щоб розібратися.','Раз на тиждень дивитися 1 культовий фільм або читати 1 книгу, які вважаються «базою» для освіченої людини (класика кіно, біографії великих лідерів).']},
  ]},

    {text:'KR2 (The Test Drive): Успішно реалізовано кейс «1 місяць соло-життя» в орендованій квартирі в Одесі з повним самозабезпеченням (бюджет, їжа, комуналка).',kts:[]},

{name:'ЗДОРОВ\'Я',ck:'health',icon:'🏥',color:'#ef4444',obs:[

    {text:'KR3 (Daily Motion): Виконання норми «мінімальної активності» — 15 хвилин прогулянки на вулиці щодня (незалежно від погоди).',kts:[]},

  {text:'Побудувати систему харчування, яка забезпечує стабільний набір маси (0.5–1 кг на місяць) без втрати якості енергії та здоров\'я шкіри.',krs:[

  ]},
  {text:'Побудувати стабільну звичку споживання води для максимізації клітинної регенерації та підтримки чистоти шкіри.',krs:[

    {text:'KR2 (Skin Quality): Суб\'єктивне зменшення запалень та покращення тонусу шкіри (ефект «сяяння») до кінця Q1.',kts:[]},
    {text:'KR3 (Morning Routine): 100% виконання правила «перша склянка води (300-500 мл) одразу після пробудження».',kts:['Тримати велику пляшку або графин з водою безпосередньо на робочому столі біля комп\'ютера. Якщо вода перед очима — мозок п\'є її автоматично.','Впровадити ритуал: замовляєш каву — одразу випиваєш склянку води.','Якщо чиста вода «не лізе», додавай лимон, м’яту або огірок — це покращує смак і додає мінімальну кількість електролітів для детоксу.','На початковому етапі (2-3 тижні) використовувати трекер води або прості відмітки в Notion, щоб зафіксувати звичку в нейронних мережах.']},

  {text:'Побудувати систему регулярного медичного контролю.',krs:[
    {text:'KR1 (Diagnostics): Пройдено базовий комплексний чекап (аналізи крові: вітаміни, гормони, мікроелементи + стоматолог + зір) до кінця Q1.',kts:[]},
    {text:'KR2 (Diagnostics): Пройдено базовий комплексний чекап (аналізи крові: вітаміни, гормони, мікроелементи + стоматолог) до кінця Q4.',kts:['Сформувати список необхідних аналізів (Біохімія, Вітамін D, B12, Ферритин, ТТГ) — це те, що найчастіше впливає на енергію.','Записатися до стоматолога на огляд та чистку вже в поточному кварталі (це найпростіший старт).','Після отримання результатів аналізів проконсультуватися з фахівцем (нутріціологом/терапевтом) для корекції раціону чи прийому вітамінів.','Зберігати всі результати в окремій папці (цифровій або фізичній), щоб відстежувати динаміку здоров\'я з роками.']},

  {text:'Досягти стану стійкої ремісії хронічного тонзиліту, запобігаючи загостренням протягом усього року.',krs:[

    {text:'KR2 (Visual Control): Відсутність гнійних пробок у мигдалинах та зменшення їхнього набряку (контролюється тобою та ЛОР-лікарем).',kts:['Впровадити ритуал «Ранкове зрошення»: полоскання горла звичайною водою кімнатної температури або слабким сольовим розчином після чищення зубів.','Уникати екстремально холодних напоїв у періоди високого стресу (кортизол знижує імунітет, і холод стає тригером).','Записатися до ЛОРа на профілактичний огляд у Q1, щоб оцінити стан і призначити промивання.','Підтримувати вологість у кімнаті (особливо під час сну) та пити достатньо води (твій OKR по воді прямо допомагає горлу).']},

  {text:'Побудувати стійку систему енергоменеджменту для переходу з режиму «виживання» (6/10) у режим «пікової продуктивності» (8-9/10).',krs:[
    {text:'KR1 (Energy Metric): Підняти суб\'єктивний рівень ранкової енергії до стабільних 8/10 до кінця березня 2026 року.',kts:[]},
    {text:'KR2 (Digital Boundaries): 100% дотримання правила «Цифрової комендантської години»: жодних робочих чатів за 1 годину до сну та 30 хв після пробудження.',kts:[]},
    {text:'KR3 (Systemic Rest): Мати мінімум 1 повний вихідний на тиждень (Digital Detox Day), де повністю відсутні робочі та навчальні завдання.',kts:['робити щоденні рефлексії.','Внести в календар блоки «глухої оборони» (Deep Work/Rest) по 30-60 хв, коли телефон у режимі «Не турбувати».','Кожного вихідного пробувати новий вид відпочинку (не екранний!): прогулянка без навушників, басейн, малювання, сон вдень, спілкування з друзями не про роботу.','Впровадити правило «5 хвилин тиші» між перемиканнями з одного проєкту на інший (наприклад, між ENKO та коледжем).']},

let ST;try{ST=JSON.parse(localStorage.getItem(SKEY))||{}}catch(e){ST={}}
function saveState(){localStorage.setItem(SKEY,JSON.stringify(ST))}
function uid(ci,oi,ki,ti){return ci+'_'+oi+'_'+ki+(ti!==undefined?'_'+ti:'')}
function krVal(ci,oi,ki){return ST[uid(ci,oi,ki)]||0}
function ktDone(ci,oi,ki,ti){return!!ST[uid(ci,oi,ki,ti)]}
function setKr(ci,oi,ki,v){ST[uid(ci,oi,ki)]=v;saveState();renderAll()}
function toggleKt(ci,oi,ki,ti){var k=uid(ci,oi,ki,ti);ST[k]=!ST[k];saveState();renderAll()}

function objPct(ci,oi){var obj=DATA[ci].obs[oi];if(!obj.krs.length)return 0;
  return Math.round(obj.krs.reduce(function(s,_,ki){return s+krVal(ci,oi,ki)},0)/obj.krs.length)}
function catPct(ci){var cat=DATA[ci];if(!cat.obs.length)return 0;
  return Math.round(cat.obs.reduce(function(s,_,oi){return s+objPct(ci,oi)},0)/cat.obs.length)}
function totalPct(){if(!DATA.length)return 0;
  return Math.round(DATA.reduce(function(s,_,ci){return s+catPct(ci)},0)/DATA.length)}

var activeFilter='all';
var closedCats={};var closedObjs={};

function setFilter(f){activeFilter=f;renderAll()}
function toggleCat(ci){closedCats[ci]=!closedCats[ci];renderAll()}
function toggleObj(ci,oi){closedObjs[ci+'_'+oi]=!closedObjs[ci+'_'+oi];renderAll()}

function renderAll(){
  document.getElementById('overallPct').textContent=totalPct()+'%';
  var fEl=document.getElementById('filters');
  var fh='<div class="fbtn '+(activeFilter==='all'?'act':'')+'" style="'+(activeFilter==='all'?'color:#7c5cff;border-color:#7c5cff':'')+'" onclick="setFilter('all')">Всі</div>';
  DATA.forEach(function(c,ci){var act=activeFilter===c.ck;
    fh+='<div class="fbtn '+(act?'act':'')+'" style="'+(act?'color:'+c.color+';border-color:'+c.color:'')+'" onclick="setFilter(''+c.ck+'')">'+c.icon+' '+c.name+'</div>'});
  fEl.innerHTML=fh;

  var html='';
  DATA.forEach(function(cat,ci){
    if(activeFilter!=='all'&&activeFilter!==cat.ck)return;
    var cp=catPct(ci);
    var closed=closedCats[ci]?'closed':'';
    html+='<div class="catblock '+closed+'">';
    html+='<div class="cathead" onclick="toggleCat('+ci+')" style="border-left:3px solid '+cat.color+';padding-left:12px">';
    html+='<span class="cic">'+cat.icon+'</span><b>'+cat.name+'</b>';
    html+='<span class="cpct" style="color:'+cat.color+'">'+cp+'%</span>';
    html+='<span class="chev">&#9662;</span></div>';
    html+='<div class="catbody">';

    cat.obs.forEach(function(obj,oi){
      var op=objPct(ci,oi);
      var oc=closedObjs[ci+'_'+oi]?'closed':'';
      html+='<div class="obj '+oc+'">';
      html+='<div class="obj-h" onclick="toggleObj('+ci+','+oi+')">';
      html+='<span class="onum" style="background:'+cat.color+'22;color:'+cat.color+'">O'+(oi+1)+'</span>';
      html+='<span class="otxt">'+obj.text+'</span>';
      html+='<span class="opct" style="color:'+cat.color+'">'+op+'%</span>';
      html+='<span class="ochev">&#9662;</span></div>';
      html+='<div class="obj-b">';
      html+='<div class="pbar"><div class="pbar-fill" style="width:'+op+'%;background:'+cat.color+'"></div></div>';

      obj.krs.forEach(function(kr,ki){
        var kv=krVal(ci,oi,ki);
        html+='<div class="kr">';
        html+='<div class="kr-head">';
        html+='<span class="kr-tag" style="background:'+cat.color+'22;color:'+cat.color+'">KR'+(ki+1)+'</span>';
        html+='<span class="kr-txt">'+kr.text+'</span>';
        html+='<span class="kr-pct" style="color:'+cat.color+'">'+kv+'%</span></div>';
        html+='<div class="kr-slider"><input type="range" min="0" max="100" value="'+kv+'" oninput="setKr('+ci+','+oi+','+ki+',+this.value)"/></div>';
        html+='<div class="pbar"><div class="pbar-fill" style="width:'+kv+'%;background:'+cat.color+'"></div></div>';

        kr.kts.forEach(function(kt,ti){
          var done=ktDone(ci,oi,ki,ti);
          html+='<div class="kt">';
          html+='<div class="kt-dot '+(done?'done':'')+'" onclick="toggleKt('+ci+','+oi+','+ki+','+ti+')"></div>';
          html+='<div class="kt-txt '+(done?'done':'')+'" onclick="toggleKt('+ci+','+oi+','+ki+','+ti+')">'+kt+'</div></div>';
        });
        html+='</div>';
      });
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('app').innerHTML=html;
}

function buildPayload(){
  var p={};p['Дата']=new Date().toISOString().slice(0,10);p['Тип']='OKR';
  DATA.forEach(function(cat,ci){
    p[cat.name+' (%)']=catPct(ci);
    cat.obs.forEach(function(obj,oi){
      var oLabel='O'+(oi+1)+': '+obj.text.slice(0,40);
      p[cat.icon+' '+oLabel+' (%)']=objPct(ci,oi);
      obj.krs.forEach(function(kr,ki){p['KR'+(ki+1)+': '+kr.text.slice(0,35)]=krVal(ci,oi,ki)+'%'});
    });
  });
  return p}
function syncOKR(){
  var hook=localStorage.getItem(HOOKKEY),btn=document.getElementById('sendBtn'),txt=document.getElementById('sendTxt');
  var payload=buildPayload();
  if(!hook){try{navigator.clipboard.writeText(JSON.stringify(payload,null,2))}catch(e){}toast('JSON скопійовано.');return}
  btn.classList.add('busy');txt.textContent='Синхронізую…';
  fetch(hook,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(){
    btn.classList.remove('busy');btn.classList.add('ok');txt.textContent='OKR синхронізовано ✓';
    setTimeout(function(){btn.classList.remove('ok');txt.textContent='Синхронізувати OKR'},3500);
  }).catch(function(){btn.classList.remove('busy');txt.textContent='Синхронізувати OKR';toast('Помилка мережі.')})}
var tt_=0;function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt_);tt_=setTimeout(function(){t.classList.remove('show')},2600)}

renderAll();
</script>
